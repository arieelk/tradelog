<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detox Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,900;1,9..144,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0f11;--paper:#161719;--ink:#e8e4de;--ink-dim:rgba(232,228,222,0.4);--ink-faint:rgba(232,228,222,0.07);--green:#4ade80;--green-light:rgba(74,222,128,0.12);--green-mid:#22c55e;--red:#f87171;--red-light:rgba(248,113,113,0.12);--red-mid:#ef4444;--gold:#f0b254;--border:rgba(232,228,222,0.1);}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--ink);min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:3rem 1.5rem 5rem}
.header{margin-bottom:2.5rem;border-bottom:1px solid var(--border);padding-bottom:1.5rem;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem}
.header-left h1{font-family:'Fraunces',serif;font-size:clamp(2.2rem,7vw,3.4rem);font-weight:900;line-height:.95;letter-spacing:-.03em}
.header-left h1 em{font-style:italic;font-weight:300;color:var(--gold)}
.header-sub{font-size:11px;color:var(--ink-dim);letter-spacing:.12em;text-transform:uppercase;margin-top:.5rem}
.header-stats{display:flex;gap:1.5rem;flex-shrink:0}
.stat-block{text-align:right}
.stat-val{font-family:'Fraunces',serif;font-size:2rem;font-weight:600;line-height:1}
.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}
.stat-lbl{font-size:10px;color:var(--ink-dim);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.month-label{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:600;letter-spacing:-.01em}
.nav-btn{background:none;border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-dim);font-size:14px;transition:all .15s}
.nav-btn:hover{border-color:var(--ink);color:var(--ink);background:var(--ink-faint)}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.weekday-label{text-align:center;font-size:10px;color:var(--ink-dim);letter-spacing:.1em;text-transform:uppercase;padding:4px 0}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;cursor:pointer;position:relative;transition:transform .1s,box-shadow .15s;border:1px solid transparent;user-select:none;-webkit-tap-highlight-color:transparent}
.cal-day:hover:not(.empty):not(.future){transform:scale(1.07);z-index:2;box-shadow:0 4px 14px rgba(0,0,0,.13)}
.cal-day.empty{cursor:default;background:transparent;border-color:transparent}
.cal-day.future{cursor:default;background:transparent;border-color:var(--ink-faint);color:var(--ink-dim);opacity:.3}
.cal-day.neutral{background:var(--paper);border-color:var(--border);color:var(--ink-dim)}
.cal-day.green{background:var(--green-light);border-color:rgba(45,106,79,.2);color:var(--green);font-weight:500}
.cal-day.green::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--green-mid)}
.cal-day.red{background:var(--red-light);border-color:rgba(193,18,31,.2);color:var(--red);font-weight:500}
.cal-day.today{box-shadow:0 0 0 2px var(--gold)}
.day-num{font-size:13px;line-height:1}
.fail-dots{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap;justify-content:center;max-width:80%}
.fail-dot{font-size:7px;line-height:1}
.legend{display:flex;gap:1.25rem;margin-top:1rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-dim);letter-spacing:.04em}
.legend-dot{width:12px;height:12px;border-radius:3px}
.legend-dot.green{background:var(--green-light);border:1px solid rgba(74,222,128,.3)}
.legend-dot.red{background:var(--red-light);border:1px solid rgba(248,113,113,.3)}
.legend-dot.neutral{background:var(--paper);border:1px solid var(--border)}
.last-seen-list{display:flex;flex-direction:column;gap:2px}
.last-seen-row{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;border-radius:10px;background:var(--paper);border:1px solid var(--border)}
.last-seen-name{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600;flex:1}
.last-seen-date{font-size:11px;color:var(--ink-dim);letter-spacing:.04em;text-align:right}
.last-seen-date.never{color:var(--green);font-weight:500}
.section-title{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-dim);margin:2rem 0 .75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.habits-list{display:flex;flex-direction:column;gap:2px}
.habit-row{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;border-radius:10px;background:var(--paper);border:1px solid var(--border)}
.habit-emoji-sm{font-size:1rem;flex-shrink:0}
.habit-name-sm{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600;flex:1}
.habit-streak{font-size:11px;color:var(--ink-dim);letter-spacing:.04em}
.habit-streak.good{color:var(--green)}
.streak-bar{display:flex;gap:3px;margin-top:1.25rem;flex-wrap:wrap}
.streak-pip{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.streak-pip.green{background:var(--green-mid)}.streak-pip.red{background:var(--red-mid)}.streak-pip.neutral{background:var(--ink-faint)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,24,20,.5);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{background:var(--paper);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:1.5rem 1.5rem 2rem;width:100%;max-width:680px;animation:slide-up .25s cubic-bezier(.16,1,.3,1)}
@keyframes slide-up{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-date-label{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;margin-bottom:.25rem}
.modal-sub{font-size:11px;color:var(--ink-dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1.25rem}
.modal-instruction{font-size:12px;color:var(--ink-dim);margin-bottom:1rem;letter-spacing:.03em}
.habit-toggles{display:flex;flex-direction:column;gap:6px;margin-bottom:1.25rem}
.habit-toggle{display:flex;align-items:center;gap:.75rem;padding:.65rem .9rem;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.habit-toggle:hover{border-color:var(--ink)}
.habit-toggle.failed{border-color:var(--red);background:var(--red-light)}
.toggle-emoji{font-size:1.1rem}
.toggle-name{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600;flex:1}
.habit-toggle.failed .toggle-name{color:var(--red)}
.toggle-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s}
.habit-toggle.failed .toggle-check{background:var(--red);border-color:var(--red);color:white}
.modal-status{font-size:12px;padding:.5rem .75rem;border-radius:8px;margin-bottom:1rem;font-weight:500;letter-spacing:.03em}
.modal-status.green{background:var(--green-light);color:var(--green)}
.modal-status.red{background:var(--red-light);color:var(--red)}
.modal-actions{display:flex;gap:.5rem}
.btn{flex:1;padding:.7rem;border-radius:10px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;border:1px solid var(--border);transition:all .15s;letter-spacing:.03em}
.btn-cancel{background:var(--bg);color:var(--ink-dim)}
.btn-cancel:hover{color:var(--ink);border-color:var(--ink)}
.btn-save{background:var(--ink);color:var(--bg);border-color:var(--ink);font-weight:500}
.btn-save:hover{opacity:.85}
.btn-clear{flex:0;padding:.7rem .9rem;background:none;color:var(--ink-dim);font-size:11px}
.btn-clear:hover{color:var(--red);border-color:var(--red)}
@media(max-width:480px){.app{padding:2rem 1rem 4rem}.cal-day{font-size:11px;border-radius:6px}.header-stats{gap:1rem}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>DETOX<br><em>tracker</em></h1>
      <p class="header-sub">un día limpio a la vez</p>
    </div>
    <div class="header-stats">
      <div class="stat-block"><div class="stat-val green" id="statGreen">0</div><div class="stat-lbl">días limpios</div></div>
      <div class="stat-block"><div class="stat-val red" id="statRed">0</div><div class="stat-lbl">recaídas</div></div>
      <div class="stat-block"><div class="stat-val" id="statStreak">0</div><div class="stat-lbl">racha actual</div></div>
    </div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>
  <div class="weekdays" id="weekdays"></div>
  <div class="calendar-grid" id="calGrid"></div>
  <div class="streak-bar" id="streakBar"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot green"></div> Día limpio</div>
    <div class="legend-item"><div class="legend-dot red"></div> Recaída</div>
    <div class="legend-item"><div class="legend-dot neutral"></div> Sin registrar</div>
  </div>
  <p class="section-title">Hábitos &mdash; racha actual</p>
  <div class="habits-list" id="habitsList"></div>
  <p class="section-title">Última vez</p>
  <div class="last-seen-list" id="lastSeenList"></div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-date-label" id="modalDateLabel"></div>
    <div class="modal-sub" id="modalDateSub"></div>
    <div class="modal-instruction">Marcá los hábitos en los que fallaste ese día:</div>
    <div class="habit-toggles" id="habitToggles"></div>
    <div class="modal-status" id="modalStatus"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-clear" onclick="clearDay()" id="clearBtn">Limpiar</button>
      <button class="btn btn-save" onclick="saveDay()">Guardar</button>
    </div>
  </div>
</div>
<script>
const HABITS=[
  {id:'alcohol',emoji:'🍸',name:'Alcohol'},
  {id:'weed',emoji:'🌿',name:'Marihuana'},
  {id:'junk',emoji:'🍔',name:'Comida chatarra'},
  {id:'cm3n',emoji:'🥛',name:'CM3N'},
  {id:'gambling',emoji:'🎯',name:'Apuestas'},
  {id:'dulce',emoji:'🍫',name:'Dulce'}
];
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
let viewYear,viewMonth,modalDateKey=null,modalFailed=new Set();
function load(){try{return JSON.parse(localStorage.getItem('detox_cal_v1')||'{}')}catch{return{}}}
function save(d){localStorage.setItem('detox_cal_v1',JSON.stringify(d))}
function toKey(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function todayKey(){const n=new Date();return toKey(n.getFullYear(),n.getMonth(),n.getDate())}
function todayParts(){const n=new Date();return{y:n.getFullYear(),m:n.getMonth(),d:n.getDate()}}
function dayClass(key,data){const e=data[key];if(!e)return'neutral';return(e.failed&&e.failed.length>0)?'red':'green'}
function calcStats(data){
  const t=todayKey();let green=0,red=0;
  Object.keys(data).forEach(k=>{if(k>t)return;const c=dayClass(k,data);if(c==='green')green++;if(c==='red')red++;});
  let streak=0;const dt=new Date();
  for(let i=0;i<3650;i++){const key=toKey(dt.getFullYear(),dt.getMonth(),dt.getDate());if(key>t){dt.setDate(dt.getDate()-1);continue}if(dayClass(key,data)!=='green')break;streak++;dt.setDate(dt.getDate()-1);}
  return{green,red,streak};
}
function habitStreak(id,data){
  let s=0;const t=todayKey();const dt=new Date();
  for(let i=0;i<3650;i++){const key=toKey(dt.getFullYear(),dt.getMonth(),dt.getDate());if(key>t){dt.setDate(dt.getDate()-1);continue}const e=data[key];if(!e)break;if(e.failed&&e.failed.includes(id))break;s++;dt.setDate(dt.getDate()-1);}
  return s;
}
function renderAll(){const data=load();renderCalendar(data);renderStats(data);renderHabits(data);renderStreakBar(data);renderLastSeen(data)}
function renderStats(data){const{green,red,streak}=calcStats(data);document.getElementById('statGreen').textContent=green;document.getElementById('statRed').textContent=red;document.getElementById('statStreak').textContent=streak}
function renderHabits(data){
  const list=document.getElementById('habitsList');list.innerHTML='';
  HABITS.forEach(h=>{const s=habitStreak(h.id,data);const row=document.createElement('div');row.className='habit-row';row.innerHTML='<span class="habit-emoji-sm">'+h.emoji+'</span><span class="habit-name-sm">'+h.name+'</span><span class="habit-streak '+(s>0?'good':'')+'">'+( s>0?s+' día'+(s>1?'s limpios':' limpio'):'sin racha')+'</span>';list.appendChild(row)});
}
function renderStreakBar(data){
  const bar=document.getElementById('streakBar');bar.innerHTML='';const t=todayKey();const dt=new Date();dt.setDate(dt.getDate()-59);
  for(let i=0;i<60;i++){const key=toKey(dt.getFullYear(),dt.getMonth(),dt.getDate());const pip=document.createElement('div');const cls=key>t?'':dayClass(key,data);pip.className='streak-pip '+(cls||'neutral');pip.title=key;bar.appendChild(pip);dt.setDate(dt.getDate()+1);}
}
function renderCalendar(data){
  const t=todayKey();
  document.getElementById('weekdays').innerHTML=DAYS.map(d=>'<div class="weekday-label">'+d+'</div>').join('');
  document.getElementById('monthLabel').textContent=MONTHS[viewMonth]+' '+viewYear;
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e)}
  for(let d=1;d<=daysInMonth;d++){
    const key=toKey(viewYear,viewMonth,d);const isFuture=key>t;const isToday=key===t;
    const cls=isFuture?'future':dayClass(key,data);
    const cell=document.createElement('div');cell.className='cal-day '+cls+(isToday?' today':'');
    const num=document.createElement('span');num.className='day-num';num.textContent=d;cell.appendChild(num);
    if(cls==='red'&&data[key]&&data[key].failed){const dots=document.createElement('div');dots.className='fail-dots';data[key].failed.forEach(hId=>{const h=HABITS.find(x=>x.id===hId);if(h){const dot=document.createElement('span');dot.className='fail-dot';dot.textContent=h.emoji;dots.appendChild(dot)}});cell.appendChild(dots);}
    if(!isFuture)cell.addEventListener('click',()=>openModal(key));
    grid.appendChild(cell);
  }
}
function openModal(key){
  modalDateKey=key;const data=load();const entry=data[key]||{};modalFailed=new Set(entry.failed||[]);
  const parts=key.split('-').map(Number);const dateObj=new Date(parts[0],parts[1]-1,parts[2]);
  document.getElementById('modalDateLabel').textContent=dateObj.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}).replace(/^\w/,c=>c.toUpperCase());
  document.getElementById('modalDateSub').textContent=key;
  buildToggles();updateModalStatus();
  document.getElementById('clearBtn').style.display=data[key]?'':'none';
  document.getElementById('modalOverlay').classList.add('open');
}
function buildToggles(){
  const c=document.getElementById('habitToggles');c.innerHTML='';
  HABITS.forEach(h=>{const f=modalFailed.has(h.id);const el=document.createElement('div');el.className='habit-toggle'+(f?' failed':'');el.innerHTML='<span class="toggle-emoji">'+h.emoji+'</span><span class="toggle-name">'+h.name+'</span><div class="toggle-check">'+(f?'&#x2715;':'')+'</div>';el.addEventListener('click',()=>{if(modalFailed.has(h.id))modalFailed.delete(h.id);else modalFailed.add(h.id);buildToggles();updateModalStatus()});c.appendChild(el)});
}
function updateModalStatus(){
  const el=document.getElementById('modalStatus');
  if(modalFailed.size===0){el.className='modal-status green';el.textContent='\u2713 D\u00eda limpio \u2014 ning\u00fan h\u00e1bito fallado'}
  else{el.className='modal-status red';const names=[...modalFailed].map(id=>HABITS.find(h=>h.id===id)?.name).filter(Boolean);el.textContent='\u2715 Reca\u00edda en: '+names.join(', ')}
}
function saveDay(){const data=load();data[modalDateKey]={failed:[...modalFailed]};save(data);closeModal();renderAll()}
function clearDay(){const data=load();delete data[modalDateKey];save(data);closeModal();renderAll()}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');modalDateKey=null;modalFailed=new Set()}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal()});
document.getElementById('prevBtn').addEventListener('click',()=>{viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--}renderAll()});
document.getElementById('nextBtn').addEventListener('click',()=>{viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++}renderAll()});
function renderLastSeen(data){
  const list=document.getElementById('lastSeenList');list.innerHTML='';
  const t=todayKey();
  HABITS.forEach(h=>{
    // find most recent day (<=today) where this habit was failed
    const failDays=Object.keys(data).filter(k=>k<=t&&data[k].failed&&data[k].failed.includes(h.id)).sort().reverse();
    const lastKey=failDays[0]||null;
    let label,isNever=false;
    if(!lastKey){label='Sin registro de recaída';isNever=true;}
    else{
      const parts=lastKey.split('-').map(Number);
      const d=new Date(parts[0],parts[1]-1,parts[2]);
      const diffMs=new Date()-d;const diffD=Math.floor(diffMs/86400000);
      const dateStr=d.toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'});
      label=dateStr+' (hace '+diffD+' día'+(diffD!==1?'s':'')+')';
    }
    const row=document.createElement('div');row.className='last-seen-row';
    row.innerHTML='<span class="habit-emoji-sm">'+h.emoji+'</span><span class="last-seen-name">'+h.name+'</span><span class="last-seen-date'+(isNever?' never':'')+'">'+label+'</span>';
    list.appendChild(row);
  });
}
const tp=todayParts();viewYear=tp.y;viewMonth=tp.m;renderAll();
</script>
</body>
</html>
